<!DOCTYPE html>
<html>
<head><title>Generate Icons</title></head>
<body>
  <p>Right-click each image below and "Save image as..." to save the icons:</p>
  <h3>192x192</h3>
  <canvas id="c192" width="192" height="192"></canvas>
  <h3>512x512</h3>
  <canvas id="c512" width="512" height="512"></canvas>
  <script>
    function drawIcon(canvas) {
      const ctx = canvas.getContext('2d');
      const s = canvas.width;

      // Background gradient
      const grad = ctx.createLinearGradient(0, 0, s, s);
      grad.addColorStop(0, '#8b5cf6');
      grad.addColorStop(1, '#ec4899');

      // Rounded rect
      const r = s * 0.22;
      ctx.beginPath();
      ctx.moveTo(r, 0);
      ctx.lineTo(s - r, 0);
      ctx.quadraticCurveTo(s, 0, s, r);
      ctx.lineTo(s, s - r);
      ctx.quadraticCurveTo(s, s, s - r, s);
      ctx.lineTo(r, s);
      ctx.quadraticCurveTo(0, s, 0, s - r);
      ctx.lineTo(0, r);
      ctx.quadraticCurveTo(0, 0, r, 0);
      ctx.closePath();
      ctx.fillStyle = grad;
      ctx.fill();

      // Music note
      ctx.fillStyle = 'white';
      const cx = s * 0.5, cy = s * 0.5;
      const noteScale = s / 24;

      ctx.save();
      ctx.translate(cx - 12 * noteScale, cy - 12 * noteScale);
      ctx.scale(noteScale, noteScale);
      ctx.beginPath();
      ctx.moveTo(12, 3);
      ctx.lineTo(12, 13.55);
      ctx.arc(10, 17, 2, 0, Math.PI * 2);
      ctx.moveTo(14, 7);
      ctx.lineTo(18, 7);
      ctx.lineTo(18, 3);
      ctx.lineTo(14, 3);
      ctx.closePath();
      ctx.fill();
      ctx.restore();
    }

    drawIcon(document.getElementById('c192'));
    drawIcon(document.getElementById('c512'));
  </script>
</body>
</html>
