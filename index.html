<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Smart Tool">
  <link rel="apple-touch-icon" href="icons/icon-192.png">
  <link rel="icon" type="image/svg+xml" href="icons/icon.svg">
  <link rel="manifest" href="manifest.json">
  <title>Smart Tool</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      -webkit-tap-highlight-color: transparent;
    }

    .container {
      text-align: center;
      display: flex;
      gap: 40px;
      flex-wrap: wrap;
      justify-content: center;
      align-items: center;
    }

    .tool-btn {
      display: inline-flex;
      flex-direction: column;
      align-items: center;
      gap: 16px;
      text-decoration: none;
      -webkit-touch-callout: none;
    }

    .icon-wrapper {
      width: 140px;
      height: 140px;
      border-radius: 32px;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: transform 0.2s ease, box-shadow 0.2s ease;
    }

    .tool-btn:active .icon-wrapper {
      transform: scale(0.92);
    }

    .icon-wrapper.music {
      background: linear-gradient(135deg, #8b5cf6, #ec4899);
      box-shadow: 0 10px 40px rgba(139, 92, 246, 0.4);
    }

    .icon-wrapper.video {
      background: linear-gradient(135deg, #e50914, #ff6b35);
      box-shadow: 0 10px 40px rgba(229, 9, 20, 0.4);
    }

    .icon-wrapper svg {
      width: 70px;
      height: 70px;
      fill: white;
    }

    .label {
      color: rgba(255, 255, 255, 0.9);
      font-size: 18px;
      font-weight: 500;
      letter-spacing: 0.5px;
    }
  </style>
</head>
<body>
  <div class="container">
    <a href="https://www.qqmp3.vip/" class="tool-btn">
      <div class="icon-wrapper music">
        <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
          <path d="M12 3v10.55A4 4 0 1 0 14 17V7h4V3h-6zM10 19a2 2 0 1 1 0-4 2 2 0 0 1 0 4z"/>
        </svg>
      </div>
      <span class="label">Music</span>
    </a>

    <a href="https://www.netflixgc.com/" class="tool-btn">
      <div class="icon-wrapper video">
        <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
          <path d="M18 4l2 4h-3l-2-4h-2l2 4h-3l-2-4H8l2 4H7L5 4H4c-1.1 0-2 .9-2 2v12c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V4h-4zM4 18V8h16v10H4z"/>
        </svg>
      </div>
      <span class="label">Video</span>
    </a>
  </div>

  <script>
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('sw.js');
    }
  </script>
</body>
</html>
